<svg viewBox="0 0 680 320" width="680" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="pondBg" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#0d3028"/>
      <stop offset="50%" stop-color="#0a2018"/>
      <stop offset="100%" stop-color="#061410"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="30%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1e6b6b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e6b6b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jadeGlow" cx="72%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2d8c6e" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2d8c6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lightPatch1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffcc" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lightPatch2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffcc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Koi swim animations -->
    <style>
      @keyframes koiSwim1 {
        0%   { transform: translate(50px, 90px) rotate(18deg); opacity: 0.45; }
        25%  { transform: translate(220px, 60px) rotate(-8deg); opacity: 0.75; }
        55%  { transform: translate(460px, 110px) rotate(22deg); opacity: 0.6; }
        80%  { transform: translate(560px, 70px) rotate(-12deg); opacity: 0.5; }
        100% { transform: translate(50px, 90px) rotate(18deg); opacity: 0.45; }
      }
      @keyframes koiSwim2 {
        0%   { transform: translate(500px, 140px) rotate(-20deg) scaleX(-1); opacity: 0.4; }
        35%  { transform: translate(300px, 175px) rotate(8deg) scaleX(-1); opacity: 0.7; }
        65%  { transform: translate(100px, 125px) rotate(-15deg) scaleX(-1); opacity: 0.55; }
        100% { transform: translate(500px, 140px) rotate(-20deg) scaleX(-1); opacity: 0.4; }
      }
      @keyframes koiSwim3 {
        0%   { transform: translate(280px, 40px) rotate(5deg); opacity: 0.3; }
        45%  { transform: translate(540px, 130px) rotate(-18deg); opacity: 0.6; }
        100% { transform: translate(280px, 40px) rotate(5deg); opacity: 0.3; }
      }
      @keyframes shimmer1 {
        0%,100% { opacity: 0.3; transform: scaleX(0.7) translateX(-3%); }
        50%     { opacity: 0.7; transform: scaleX(1.1) translateX(3%); }
      }
      @keyframes shimmer2 {
        0%,100% { opacity: 0.2; transform: scaleX(0.8) translateX(2%); }
        50%     { opacity: 0.55; transform: scaleX(1.05) translateX(-2%); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0px) rotate(-0.5deg); }
        50%     { transform: translateY(-6px) rotate(0.5deg); }
      }
      @keyframes ripple1 {
        0% { r: 4; opacity: 0.6; stroke-width: 1.5; }
        100% { r: 30; opacity: 0; stroke-width: 0.5; }
      }
      @keyframes ripple2 {
        0% { r: 4; opacity: 0.5; stroke-width: 1; }
        100% { r: 22; opacity: 0; stroke-width: 0.4; }
      }
      @keyframes lightFloat {
        0%,100% { opacity: 0.6; }
        50%     { opacity: 1; }
      }
      @keyframes dragonfly {
        0%,100% { transform: translate(490px, 72px) rotate(-5deg); }
        50%     { transform: translate(510px, 62px) rotate(5deg); }
      }
      .koi1 { animation: koiSwim1 20s ease-in-out infinite; }
      .koi2 { animation: koiSwim2 25s ease-in-out infinite; animation-delay: -8s; }
      .koi3 { animation: koiSwim3 17s ease-in-out infinite; animation-delay: -12s; }
      .frog-float { animation: float 3.5s ease-in-out infinite; }
      .shimbar1 { animation: shimmer1 4s ease-in-out infinite; }
      .shimbar2 { animation: shimmer2 4s ease-in-out infinite; animation-delay: -2s; }
      .lp1 { animation: lightFloat 7s ease-in-out infinite; }
      .lp2 { animation: lightFloat 9s ease-in-out infinite; animation-delay: -3s; }
      .dfly { animation: dragonfly 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background layers -->
  <rect width="680" height="320" fill="url(#pondBg)" rx="0"/>
  <rect width="680" height="320" fill="url(#tealGlow)"/>
  <rect width="680" height="320" fill="url(#jadeGlow)"/>

  <!-- Dappled light patches -->
  <ellipse class="lp1" cx="130" cy="100" rx="90" ry="44" fill="url(#lightPatch1)"/>
  <ellipse class="lp2" cx="520" cy="80" rx="75" ry="38" fill="url(#lightPatch2)"/>

  <!-- Water shimmer lines -->
  <line class="shimbar1" x1="0" y1="268" x2="680" y2="268" stroke="rgba(46,168,154,0.3)" stroke-width="1"/>
  <line class="shimbar2" x1="0" y1="280" x2="680" y2="280" stroke="rgba(46,168,154,0.2)" stroke-width="1"/>
  <line class="shimbar1" x1="0" y1="292" x2="680" y2="292" stroke="rgba(46,168,154,0.15)" stroke-width="1" style="animation-delay:-1s"/>

  <!-- Koi 1 — orange -->
  <g class="koi1" style="transform-origin:26px 9px;">
    <ellipse cx="26" cy="9" rx="22" ry="8" fill="#e8834a" opacity="0.85"/>
    <ellipse cx="26" cy="9" rx="13" ry="4.5" fill="#f0a060" opacity="0.55"/>
    <ellipse cx="8" cy="9" rx="7" ry="8" fill="#d46030" opacity="0.75"/>
    <path d="M48 3 Q56 9 48 15" fill="#c05020" opacity="0.8"/>
    <circle cx="10" cy="7" r="1.5" fill="#1a1a1a"/>
    <circle cx="11" cy="6.5" r="0.6" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Koi 2 — white/gold -->
  <g class="koi2" style="transform-origin:22px 8px;">
    <ellipse cx="22" cy="8" rx="18" ry="6.5" fill="#f0ede0" opacity="0.82"/>
    <ellipse cx="22" cy="8" rx="10" ry="3.5" fill="#d4a030" opacity="0.48"/>
    <ellipse cx="7" cy="8" rx="6.5" ry="7" fill="#e0d8c0" opacity="0.75"/>
    <path d="M40 3 Q47 8 40 14" fill="#c8c0a0" opacity="0.78"/>
    <circle cx="9" cy="6.5" r="1.4" fill="#1a1a1a"/>
    <circle cx="10" cy="6" r="0.5" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Koi 3 — small orange -->
  <g class="koi3" style="transform-origin:19px 7px;">
    <ellipse cx="19" cy="7" rx="15" ry="5" fill="#e8834a" opacity="0.7"/>
    <ellipse cx="19" cy="7" rx="8" ry="3" fill="#f0ede0" opacity="0.55"/>
    <ellipse cx="6" cy="7" rx="5.5" ry="6" fill="#d46030" opacity="0.68"/>
    <path d="M34 3 Q40 7 34 12" fill="#c05020" opacity="0.7"/>
    <circle cx="8" cy="5.5" r="1.2" fill="#1a1a1a"/>
  </g>

  <!-- Ripple rings at two points on water -->
  <circle cx="155" cy="278" fill="none" stroke="rgba(94,196,122,0.18)" stroke-width="1">
    <animate attributeName="r" from="4" to="36" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.6" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="278" fill="none" stroke="rgba(94,196,122,0.12)" stroke-width="1">
    <animate attributeName="r" from="4" to="28" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="510" cy="282" fill="none" stroke="rgba(94,196,122,0.14)" stroke-width="1">
    <animate attributeName="r" from="3" to="30" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Dragonfly -->
  <g class="dfly">
    <ellipse cx="0" cy="0" rx="1.5" ry="9" fill="#2ea89a"/>
    <ellipse cx="-14" cy="-4" rx="13" ry="3.5" fill="rgba(46,168,154,0.32)" transform="rotate(-8 -14 -4)"/>
    <ellipse cx="14" cy="-4" rx="13" ry="3.5" fill="rgba(46,168,154,0.32)" transform="rotate(8 14 -4)"/>
    <ellipse cx="-11" cy="2" rx="9" ry="2.5" fill="rgba(46,168,154,0.22)" transform="rotate(10 -11 2)"/>
    <ellipse cx="11" cy="2" rx="9" ry="2.5" fill="rgba(46,168,154,0.22)" transform="rotate(-10 11 2)"/>
    <circle cx="0" cy="-10" r="3.2" fill="#1e6b6b"/>
    <circle cx="-1" cy="-11" r="1.2" fill="rgba(255,255,255,0.45)"/>
  </g>

  <!-- ─── WATER SURFACE BASE ─── -->
  <ellipse cx="340" cy="300" rx="340" ry="28" fill="#0d3028" opacity="0.9"/>
  <ellipse cx="340" cy="292" rx="330" ry="18" fill="#1a5c4a" opacity="0.45"/>

  <!-- ─── LILY PADS ─── -->

  <!-- Left big lily pad -->
  <ellipse cx="112" cy="282" rx="72" ry="21" fill="#1e5c35" opacity="0.92"/>
  <ellipse cx="112" cy="279" rx="64" ry="17" fill="#2d8c6e" opacity="0.65"/>
  <line x1="112" y1="261" x2="112" y2="282" stroke="#1a4a2e" stroke-width="2" opacity="0.55"/>
  <path d="M112 263 Q92 272 76 279" stroke="#1a4a2e" stroke-width="1" fill="none" opacity="0.38"/>
  <path d="M112 263 Q132 272 148 279" stroke="#1a4a2e" stroke-width="1" fill="none" opacity="0.38"/>
  <path d="M112 261 L100 275 L112 275 Z" fill="#0d3028" opacity="0.38"/>

  <!-- Left lotus — open bloom -->
  <g transform="translate(92,248)" filter="url(#softGlow)">
    <ellipse cx="0" cy="8" rx="11" ry="4.5" fill="#1e5c35" opacity="0.85"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="#b04060" opacity="0.62" transform="rotate(-30 0 0)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="#b04060" opacity="0.62" transform="rotate(30 0 0)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="#c45c74" opacity="0.78" transform="rotate(-55 0 0)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="#c45c74" opacity="0.78" transform="rotate(55 0 0)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="#c45c74" opacity="0.78"/>
    <ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#e8909a" opacity="0.9" transform="rotate(-20 0 0)"/>
    <ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#e8909a" opacity="0.9" transform="rotate(20 0 0)"/>
    <ellipse cx="0" cy="-7" rx="4.5" ry="8" fill="#f0a8b8" opacity="0.88"/>
    <circle cx="0" cy="-2" r="5.5" fill="#f5e8d0"/>
    <circle cx="0" cy="-2" r="3" fill="#d4a030"/>
  </g>

  <!-- Small center-left lily pad -->
  <ellipse cx="248" cy="287" rx="44" ry="13" fill="#1e5c35" opacity="0.82"/>
  <ellipse cx="248" cy="285" rx="38" ry="10" fill="#2d8c6e" opacity="0.58"/>
  <line x1="248" y1="275" x2="238" y2="285" stroke="#1a4a2e" stroke-width="1.5" opacity="0.45"/>

  <!-- Small white water flowers -->
  <g transform="translate(210,293)">
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.55"/>
    <circle cx="8" cy="-3" r="3.8" fill="white" opacity="0.45"/>
    <circle cx="-6" cy="-4" r="3.5" fill="white" opacity="0.42"/>
    <circle cx="2" cy="6" r="3" fill="white" opacity="0.38"/>
    <circle cx="0" cy="0" r="2" fill="#d4a030" opacity="0.7"/>
  </g>

  <!-- Small center-right lily pad -->
  <ellipse cx="452" cy="288" rx="40" ry="12" fill="#1e5c35" opacity="0.82"/>
  <ellipse cx="452" cy="286" rx="34" ry="9" fill="#2d8c6e" opacity="0.6"/>
  <!-- Lotus bud on it -->
  <g transform="translate(452,272)">
    <ellipse cx="0" cy="0" rx="4" ry="8.5" fill="#c45c74" opacity="0.88" transform="rotate(-10 0 0)"/>
    <ellipse cx="0" cy="0" rx="4" ry="8.5" fill="#d4748a" opacity="0.88" transform="rotate(10 0 0)"/>
    <ellipse cx="0" cy="-1" rx="3" ry="6.5" fill="#f0a8b8" opacity="0.72"/>
    <ellipse cx="0" cy="9" rx="6.5" ry="3" fill="#1e5c35" opacity="0.92"/>
  </g>

  <!-- Right big lily pad -->
  <ellipse cx="572" cy="281" rx="76" ry="22" fill="#1e5c35" opacity="0.92"/>
  <ellipse cx="572" cy="278" rx="67" ry="18" fill="#2d8c6e" opacity="0.62"/>
  <line x1="572" y1="259" x2="572" y2="281" stroke="#1a4a2e" stroke-width="2" opacity="0.5"/>
  <path d="M572 261 Q552 271 536 278" stroke="#1a4a2e" stroke-width="1" fill="none" opacity="0.34"/>
  <path d="M572 261 Q592 271 608 278" stroke="#1a4a2e" stroke-width="1" fill="none" opacity="0.34"/>
  <path d="M572 259 L584 273 L572 273 Z" fill="#0d3028" opacity="0.34"/>

  <!-- Right lotus — fully open -->
  <g transform="translate(595,248)" filter="url(#softGlow)">
    <ellipse cx="0" cy="8" rx="10" ry="4" fill="#1e5c35" opacity="0.85"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9.5" fill="#b04060" opacity="0.65" transform="rotate(-35 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9.5" fill="#b04060" opacity="0.65" transform="rotate(35 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9.5" fill="#c45c74" opacity="0.80" transform="rotate(-65 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9.5" fill="#c45c74" opacity="0.80" transform="rotate(65 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9.5" fill="#c45c74" opacity="0.80"/>
    <ellipse cx="0" cy="-6" rx="4" ry="7.5" fill="#e8909a" opacity="0.92" transform="rotate(-20 0 0)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="7.5" fill="#e8909a" opacity="0.92" transform="rotate(20 0 0)"/>
    <ellipse cx="0" cy="-6" rx="4" ry="7.5" fill="#f0a8b8" opacity="0.9"/>
    <circle cx="0" cy="-1.5" r="5" fill="#f5e8d0"/>
    <circle cx="0" cy="-1.5" r="2.8" fill="#d4a030"/>
  </g>

  <!-- White flowers right side -->
  <g transform="translate(430,295)">
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.48"/>
    <circle cx="6" cy="-2" r="3" fill="white" opacity="0.38"/>
    <circle cx="-4" cy="-3" r="3" fill="white" opacity="0.36"/>
    <circle cx="0" cy="0" r="1.7" fill="#d4a030" opacity="0.65"/>
  </g>

  <!-- ─── MAIN FROG (center, on lily pad) ─── -->
  <g class="frog-float" filter="url(#dropShadow)" style="transform-origin:340px 240px;">
    <!-- lily pad under frog -->
    <ellipse cx="340" cy="265" rx="46" ry="14" fill="#1e5c35" opacity="0.97"/>
    <ellipse cx="340" cy="263" rx="40" ry="11" fill="#2d8c6e" opacity="0.72"/>
    <line x1="340" y1="251" x2="340" y2="265" stroke="#1a4a2e" stroke-width="1.8" opacity="0.5"/>

    <!-- hind legs -->
    <ellipse cx="314" cy="258" rx="15" ry="7" fill="#3d9e5a" opacity="0.82" transform="rotate(-28 314 258)"/>
    <ellipse cx="366" cy="258" rx="15" ry="7" fill="#3d9e5a" opacity="0.82" transform="rotate(28 366 258)"/>

    <!-- body -->
    <ellipse cx="340" cy="244" rx="32" ry="23" fill="#4aac6e"/>
    <!-- belly -->
    <ellipse cx="340" cy="248" rx="21" ry="15" fill="#b8ebb8"/>

    <!-- eye bumps -->
    <ellipse cx="319" cy="226" rx="14" ry="13" fill="#3d9e5a"/>
    <ellipse cx="361" cy="226" rx="14" ry="13" fill="#3d9e5a"/>
    <!-- eyes -->
    <circle cx="319" cy="225" r="9" fill="#1a1a1a"/>
    <circle cx="361" cy="225" r="9" fill="#1a1a1a"/>
    <circle cx="321" cy="222" r="3.5" fill="white"/>
    <circle cx="363" cy="222" r="3.5" fill="white"/>
    <circle cx="322" cy="221" r="1.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="364" cy="221" r="1.5" fill="rgba(255,255,255,0.6)"/>

    <!-- head bridge -->
    <rect x="307" y="232" width="66" height="15" rx="5.5" fill="#4aac6e"/>

    <!-- nostrils -->
    <circle cx="331" cy="236" r="2.2" fill="#2d8c6e"/>
    <circle cx="349" cy="236" r="2.2" fill="#2d8c6e"/>

    <!-- smile -->
    <path d="M326 248 Q340 257 354 248" stroke="#2d8c6e" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- front legs -->
    <ellipse cx="314" cy="258" rx="9.5" ry="5.5" fill="#3d9e5a" transform="rotate(-15 314 258)"/>
    <ellipse cx="366" cy="258" rx="9.5" ry="5.5" fill="#3d9e5a" transform="rotate(15 366 258)"/>

    <!-- toes left -->
    <circle cx="304" cy="261" r="2.8" fill="#3d9e5a"/>
    <circle cx="308" cy="264" r="2.8" fill="#3d9e5a"/>
    <circle cx="313" cy="266" r="2.8" fill="#3d9e5a"/>
    <!-- toes right -->
    <circle cx="376" cy="261" r="2.8" fill="#3d9e5a"/>
    <circle cx="372" cy="264" r="2.8" fill="#3d9e5a"/>
    <circle cx="367" cy="266" r="2.8" fill="#3d9e5a"/>
  </g>

  <!-- ─── TEXT ─── -->
  <text x="340" y="46" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="#5ec47a" opacity="0.85">VISITOR FROM THE LILY PAD</text>
  <text x="340" y="88" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#f0ead8" filter="url(#glow)">// yourname.dev</text>
  <text x="340" y="115" text-anchor="middle" font-family="monospace" font-size="11.5" fill="#2ea89a" letter-spacing="1">somewhere in the pond · building things that hop</text>

</svg>
