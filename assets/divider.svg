  </g>
  <g transform="translate(560,12)">
    <ellipse cx="0" cy="0" rx="3.5" ry="6" fill="#c45c74" opacity="0.75" transform="rotate(-6 0 0)"/>
    <ellipse cx="0" cy="0" rx="3.5" ry="6" fill="#d4748a" opacity="0.75" transform="rotate(6 0 0)"/>
    <ellipse cx="0" cy="6" rx="5.5" ry="2.5" fill="#1e5c35" opacity="0.9"/>
  </g>
