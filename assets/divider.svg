    <ellipse cx="0" cy="0" rx="3" ry="5.5" fill="#c45c74" opacity="0.78" transform="rotate(-8 0 0)"/>
    <ellipse cx="0" cy="0" rx="3" ry="5.5" fill="#d4748a" opacity="0.78" transform="rotate(8 0 0)"/>
